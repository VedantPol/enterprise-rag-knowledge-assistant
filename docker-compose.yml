services:
  rag-assistant:
    image: ${DOCKER_IMAGE:-enterprise-rag-assistant:latest}
    build: .
    container_name: enterprise-rag-assistant
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "${APP_PORT:-8017}:8000"
    volumes:
      - ./storage:/app/storage
      - ./data:/app/data

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: enterprise-rag-tunnel
    profiles:
      - tunnel
    restart: unless-stopped
    command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      - rag-assistant
